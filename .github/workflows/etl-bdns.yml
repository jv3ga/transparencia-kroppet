name: ETL — Subvenciones BDNS

on:
  schedule:
    - cron: "30 5 * * *"   # cada día a las 05:30 UTC (07:30 España)
  workflow_dispatch:

jobs:
  ingest:
    name: Ingestar subvenciones
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Instalar dependencias
        run: pip install -r etl/requirements.txt

      - name: Ejecutar ingestor BDNS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python etl/bdns_ingestor.py --days 2
        # 2 días para cubrir posibles retrasos en la publicación
