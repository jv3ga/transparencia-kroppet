name: ETL — Administradores BORME

on:
  schedule:
    - cron: "0 9 * * 2-6"  # Martes-Sábado a las 9:00 UTC (BORME se publica lun-vie)
  workflow_dispatch:
    inputs:
      days:
        description: "Últimos N días (por defecto 2)"
        default: "2"

jobs:
  ingest:
    name: Ingestar administradores BORME
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Instalar dependencias
        run: pip install -r etl/requirements.txt

      - name: Ejecutar ingestor BORME
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python etl/borme_ingestor.py --days ${{ inputs.days || 2 }}
        # 2 días para cubrir posibles retrasos en la publicación del BORME

      - name: Refrescar vistas materializadas
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'EOF'
          import os, psycopg2
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute("REFRESH MATERIALIZED VIEW administrador_redes")
          print("administrador_redes refrescada")
          cur.close(); conn.close()
          EOF
