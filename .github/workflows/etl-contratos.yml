name: ETL — Contratos PLACE

on:
  schedule:
    - cron: "0 5 * * *"   # cada día a las 05:00 UTC (07:00 España)
  workflow_dispatch:       # también ejecutable manualmente desde la UI de GitHub

jobs:
  ingest:
    name: Ingestar contratos
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Instalar dependencias
        run: pip install -r etl/requirements.txt

      - name: Ejecutar ingestor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python etl/place_ingestor.py --pages 20
        # 20 páginas ≈ 200-400 contratos nuevos/modificados del día
